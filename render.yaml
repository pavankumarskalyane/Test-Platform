services:
  # Backend API Web Service
  - type: web
    name: test-platform-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Requires manual setup in Render Dashboard
      - key: JWT_SECRET
        sync: false # Requires manual setup in Render Dashboard

  # Frontend Static Site
  - type: web
    name: test-platform-ui
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Requires manual setup in Render Dashboard (e.g., https://test-platform-api.onrender.com/api)
